<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slideflux</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.2.4/fabric.min.js"></script>
<style>
body{font-family:sans-serif}
#ctx{position:absolute;display:none;background:#222;color:#fff;padding:10px;border-radius:6px}
</style>
</head>
<body>

<button onclick="addText()">Text</button>

<select onchange="addShape(this.value)">
<option value="">Shape</option>
<option value="rect">Rectangle</option>
<option value="circle">Circle</option>
<option value="line">Line</option>
</select>

<button onclick="exportPPT()">Export</button>

<canvas id="c" width="960" height="540" style="border:1px solid #ccc"></canvas>

<div id="ctx">
<div>Delete (Del)</div>
<div>Duplicate (Ctrl+D)</div>
</div>

<script>
const canvas=new fabric.Canvas("c");

function addText(){
canvas.add(new fabric.Textbox("Text",{left:100,top:100,width:200}));
}

function addShape(type){
let obj;
if(type==="rect") obj=new fabric.Rect({width:100,height:60,fill:"#ccc"});
if(type==="circle") obj=new fabric.Circle({radius:40,fill:"#ccc"});
if(type==="line") obj=new fabric.Line([0,0,100,0],{stroke:"#000"});
if(obj){obj.set({left:100,top:100});canvas.add(obj);}
}

document.addEventListener("contextmenu",e=>{
e.preventDefault();
ctx.style.display="block";
ctx.style.left=e.clientX+"px";
ctx.style.top=e.clientY+"px";
});

document.addEventListener("click",()=>ctx.style.display="none");

async function exportPPT(){
const elements=[];
canvas.getObjects().forEach(o=>{
elements.push({
type:o.type==="textbox"?"text":o.type,
left:o.left,
top:o.top,
width:o.width*o.scaleX,
height:o.height*o.scaleY,
text:o.text,
src:o.src
});
});

const res=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"pptx",slides:[{elements}],title:"deck"})});
const blob=await res.blob();
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="slides.pptx";
a.click();
}
</script>

</body>
</html>
